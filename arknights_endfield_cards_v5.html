
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1rem 0;font-family:var(--font-sans)}
.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.top-bar input{flex:1;min-width:0;padding:7px 12px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.fs{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:10px 14px;margin-bottom:12px;display:flex;flex-direction:column;gap:8px}
.fr{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.fl{font-size:11px;color:var(--color-text-secondary);font-weight:500;white-space:nowrap;min-width:52px}
.fbtn{font-size:12px;padding:3px 10px;border:0.5px solid var(--color-border-secondary);border-radius:999px;background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;transition:all .12s;white-space:nowrap}
.fbtn:hover{border-color:var(--color-border-primary);color:var(--color-text-primary)}
.fbtn.active{color:var(--ab-tx);background:var(--ab-bg);border-color:var(--ab-bg)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.card{border-radius:var(--border-radius-lg);border:0.5px solid;overflow:hidden;transition:border-color .15s,transform .15s}
.card:hover{transform:translateY(-1px)}
.wname{font-size:13px;font-weight:500;color:var(--color-text-primary);line-height:1.4;display:block}
.pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:500;white-space:nowrap}
.no-res{text-align:center;padding:2.5rem;color:var(--color-text-secondary);font-size:13px;grid-column:1/-1}
.foot{font-size:11px;color:var(--color-text-secondary)}
</style>

<div class="wrap">
<div class="top-bar">
  <input type="text" id="q" placeholder="武器名で検索..." oninput="render()">
  <span class="foot" id="cnt"></span>
</div>
<div class="fs">
  <div class="fr"><span class="fl">基礎効果</span><div id="bf" style="display:flex;flex-wrap:wrap;gap:4px"></div></div>
  <div class="fr"><span class="fl">付加効果</span><div id="ef" style="display:flex;flex-wrap:wrap;gap:4px"></div></div>
  <div class="fr"><span class="fl">スキル</span><div id="sf" style="display:flex;flex-wrap:wrap;gap:4px"></div></div>
</div>
<div class="grid" id="grid"></div>
</div>

<script>
const D=[
  ["意志","電磁ダメージ","圧制",["求心の槍"]],
  ["意志","自然ダメージ","圧制",["作品：蝕跡"]],
  ["メイン能力","攻撃力","圧制",["鑑","JET"]],
  ["筋力","寒冷ダメージ","圧制",["フィンチェイサー"]],
  ["敏捷","物理ダメージ","効率",["負山"]],
  ["意志","HPアップ","効率",["昔日の逸品"]],
  ["筋力","HPアップ","効率",["O.B.J.重責"]],
  ["敏捷","物理ダメージ","巧技",["鋼鉄余音","勇猛"]],
  ["意志","必殺技効率","昂揚",["術無"]],
  ["知性","必殺技効率","昂揚",["堅城鋳造者"]],
  ["メイン能力","物理ダメージ","残虐",["輝しき名声"]],
  ["筋力","必殺技効率","残虐",["正義敬合"]],
  ["筋力","アーツ強度","残虐",["千古恒常"]],
  ["意志","回復効率","治癒",["布教の自由"]],
  ["意志","HPアップ","治癒",["騎士精神"]],
  ["筋力","HPアップ","治癒",["大雷斑","最期の声"]],
  ["知性","会心率","切骨",["芸術の独裁者"]],
  ["敏捷","会心率","切骨",["狼緋"]],
  ["意志","必殺技効率","追襲",["使命必達"]],
  ["筋力","灼熱ダメージ","追襲",["合理的決別"]],
  ["知性","アーツ強度","追襲",["O.B.J.術識"]],
  ["筋力","会心率","破砕",["破砕君主"]],
  ["意志","物理ダメージ","付術",["O.B.J.鋭矛"]],
  ["知性","電磁ダメージ","付術",["荒野迷走"]],
  ["知性","灼熱ダメージ","付術",["ダークトーチ"]],
  ["敏捷","攻撃力","付術",["大願","十二間"]],
  ["知性","寒冷ダメージ","付術",["ナビゲーター"]],
  ["知性","回復効率","付術",["蒼星の囁き"]],
  ["メイン能力","会心率","付術",["楔"]],
  ["メイン能力","アーツ強度","付術",["白夜新星"]],
  ["メイン能力","アーツダメージ","付術",["同類共食"]],
  ["敏捷","アーツダメージ","付術",["作品：衆生"]],
  ["筋力","必殺技効率","噴発",["探龍"]],
  ["敏捷","必殺技効率","噴発",["O.B.J.迅速"]],
  ["筋力","攻撃力","噴発",["クラヴェンガー"]],
  ["メイン能力","アーツ強度","噴発",["破壊ユニット"]],
  ["敏捷","攻撃力","噴発",["落草"]],
  ["敏捷","物理ダメージ","夜幕",["抑止"]],
  ["知性","攻撃力","夜幕",["フレイムフォージ","弔いの詩"]],
  ["メイン能力","会心率","夜幕",["フーヤオ"]],
  ["敏捷","会心率","夜幕",["栄光の記憶"]],
  ["知性","アーツダメージ","夜幕",["遺忘"]],
  ["敏捷","攻撃力","流回",["OBJ軽刃"]],
  ["意志","攻撃力","流回",["テルミットカッター","不知帰"]],
];

const dark=()=>window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;

// ゲーム準拠スキルカラー {acc: ゲーム色, tx: 暗色テキスト, txD: ダーク時テキスト}
const SK_COLOR={
  "圧制":"#F9F380","流回":"#F9F380","夜幕":"#F9F380","追襲":"#F9F380",
  "噴発":"#81C3F0","付術":"#81C3F0",
  "切骨":"#C2D5E0","昂揚":"#C2D5E0","残虐":"#C2D5E0","破砕":"#C2D5E0",
  "治癒":"#84F4A9","効率":"#84F4A9",
  "巧技":"#F6AFB7",
};
// 各色の暗色テキスト（コントラスト確保）
const SK_TX={
  "#F9F380":"#4a4400","#81C3F0":"#0b3a5c","#C2D5E0":"#1a3545",
  "#84F4A9":"#0a3d1f","#F6AFB7":"#5c0f20",
};

const BC={
  "意志":  {acc:"#378ADD",tx:"#042C53",txD:"#B5D4F4"},
  "筋力":  {acc:"#D85A30",tx:"#4A1B0C",txD:"#F5C4B3"},
  "敏捷":  {acc:"#639922",tx:"#173404",txD:"#C0DD97"},
  "知性":  {acc:"#7F77DD",tx:"#26215C",txD:"#CECBF6"},
  "メイン能力":{acc:"#BA7517",tx:"#412402",txD:"#FAC775"},
};

// 付加効果カラーグループ
const EF_COLOR={
  "電磁ダメージ":"#C2D5E0","寒冷ダメージ":"#C2D5E0","物理ダメージ":"#C2D5E0",
  "灼熱ダメージ":"#F9F380","自然ダメージ":"#84F4A9",
  "アーツダメージ":"#81C3F0","アーツ強度":"#81C3F0",
  "攻撃力":"#F9F380","HPアップ":"#84F4A9",
  "必殺技効率":"#F6AFB7","回復効率":"#84F4A9","会心率":"#F9F380",
};

function hex2rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}

let bF="all",eF="all",sF="all";

const ALL_ACTIVE="--ab-bg:#4a4a4a;--ab-tx:#ffffff;--ab-border:#4a4a4a";

function buildFilters(){
  const bases=[...new Set(D.map(r=>r[0]))];
  const effs=[...new Set(D.map(r=>r[1]))];
  const skills=[...new Set(D.map(r=>r[2]))];

  document.getElementById("bf").innerHTML=
    `<button class="fbtn active" style="${ALL_ACTIVE}" onclick="setB('all')">すべて</button>`+
    bases.map(b=>{const c=BC[b]||{acc:"#888",tx:"#222",txD:"#ddd"};const d=dark();return`<button class="fbtn" style="--ab-bg:${hex2rgba(c.acc,0.25)};--ab-tx:${d?c.txD:c.tx};--ab-border:${c.acc}" onclick="setB('${b}')">${b}</button>`;}).join("");

  document.getElementById("ef").innerHTML=
    `<button class="fbtn active" style="${ALL_ACTIVE}" onclick="setE('all')">すべて</button>`+
    effs.map(e=>{const acc=EF_COLOR[e]||"#888";const tx=SK_TX[acc]||"#222";return`<button class="fbtn" style="--ab-bg:${hex2rgba(acc,0.25)};--ab-tx:${dark()?"#ddd":tx};--ab-border:${acc}" onclick="setE('${e}')">${e}</button>`;}).join("");

  document.getElementById("sf").innerHTML=
    `<button class="fbtn active" style="${ALL_ACTIVE}" onclick="setS('all')">すべて</button>`+
    skills.map(s=>{const acc=SK_COLOR[s]||"#888";const tx=SK_TX[acc]||"#222";return`<button class="fbtn" style="--ab-bg:${hex2rgba(acc,0.25)};--ab-tx:${dark()?"#ddd":tx};--ab-border:${acc}" onclick="setS('${s}')">${s}</button>`;}).join("");
}

function setB(v){bF=v;document.querySelectorAll("#bf .fbtn").forEach(b=>b.classList.toggle("active",b.textContent===(v==="all"?"すべて":v)));render();}
function setE(v){eF=v;document.querySelectorAll("#ef .fbtn").forEach(b=>b.classList.toggle("active",b.textContent===(v==="all"?"すべて":v)));render();}
function setS(v){sF=v;document.querySelectorAll("#sf .fbtn").forEach(b=>b.classList.toggle("active",b.textContent===(v==="all"?"すべて":v)));render();}

function render(){
  const q=document.getElementById("q").value.trim().toLowerCase();
  const rows=D.filter(r=>{
    if(bF!=="all"&&r[0]!==bF)return false;
    if(eF!=="all"&&r[1]!==eF)return false;
    if(sF!=="all"&&r[2]!==sF)return false;
    if(q&&!r[3].some(w=>w.toLowerCase().includes(q)))return false;
    return true;
  });
  const grid=document.getElementById("grid");
  if(!rows.length){grid.innerHTML=`<div class="no-res">該当データなし</div>`;document.getElementById("cnt").textContent="0件";return;}

  const d=dark();
  grid.innerHTML=rows.map(r=>{
    const skAcc=SK_COLOR[r[2]]||"#888888";
    const skTx=SK_TX[skAcc]||"#222";
    const bkC=BC[r[0]]||{acc:"#888",tx:"#222",txD:"#ddd"};
    const efAcc=EF_COLOR[r[1]]||"#888";
    const efTx=SK_TX[efAcc]||"#222";

    // グラデーション
    const g1=hex2rgba(skAcc, d?0.30:0.22);
    const g2=hex2rgba(skAcc, d?0.10:0.08);
    const headG=hex2rgba(skAcc, d?0.40:0.28);
    const borderC=hex2rgba(skAcc, d?0.55:0.40);

    // 基礎効果ピル
    const bPillBg=hex2rgba(bkC.acc,0.18);
    const bPillTx=d?bkC.txD:bkC.tx;
    // 付加効果ピル
    const ePillBg=hex2rgba(efAcc,0.20);
    const ePillTx=d?"#ddd":efTx;
    // スキルピル
    const sPillBg=hex2rgba(skAcc,0.22);
    const sPillTx=d?"#ddd":skTx;

    return `<div class="card" style="background:linear-gradient(160deg,${g1} 0%,${g2} 45%,var(--color-background-primary) 100%);border-color:${borderC}">
      <div style="padding:10px 12px 8px;background:linear-gradient(130deg,${headG} 0%,transparent 100%);border-bottom:0.5px solid ${borderC}">
        <span class="wname">${r[3].join("・")}</span>
      </div>
      <div style="padding:8px 12px 10px;display:flex;flex-direction:column;gap:5px">
        <span class="pill" style="background:${bPillBg};color:${bPillTx}">${r[0]}</span>
        <span class="pill" style="background:${ePillBg};color:${ePillTx}">${r[1]}</span>
        <span class="pill" style="background:${sPillBg};color:${sPillTx}">${r[2]}</span>
      </div>
    </div>`;
  }).join("");
  document.getElementById("cnt").textContent=`${rows.length} / ${D.length} 件`;
}

buildFilters();render();
window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{buildFilters();render();});
</script>
