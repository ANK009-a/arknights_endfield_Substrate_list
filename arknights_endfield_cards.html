
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1rem 0;font-family:var(--font-sans)}
.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.top-bar input{flex:1;min-width:0;padding:7px 12px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.fs{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:10px 14px;margin-bottom:12px;display:flex;flex-direction:column;gap:8px}
.fr{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.fl{font-size:11px;color:var(--color-text-secondary);font-weight:500;white-space:nowrap;min-width:52px}
.fbtn{font-size:12px;padding:3px 10px;border:0.5px solid var(--color-border-secondary);border-radius:999px;background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;transition:all .12s;white-space:nowrap}
.fbtn:hover{border-color:var(--color-border-primary);color:var(--color-text-primary)}
.fbtn.active{color:var(--ab-tx);background:var(--ab-bg);border-color:var(--ab-bg)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.card{border-radius:var(--border-radius-lg);overflow:hidden;transition:transform .15s,box-shadow .15s;border:none}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.35)}
.card-head{padding:10px 12px 10px;position:relative;overflow:hidden;min-height:78px}
.card-deco{position:absolute;right:2px;top:-6px;font-size:68px;opacity:0.13;font-weight:900;pointer-events:none;line-height:1;color:#fff;user-select:none}
.card-img{position:absolute;right:8px;bottom:6px;width:52px;height:52px;object-fit:contain;z-index:2;opacity:0.92;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.4))}
.card-stars{font-size:9px;letter-spacing:3px;margin-bottom:5px;position:relative;z-index:1}
.card-type-lbl{font-size:9px;opacity:0.75;font-weight:600;letter-spacing:0.5px;line-height:1.2;position:relative;z-index:1}
.card-name-txt{font-size:13px;font-weight:700;line-height:1.35;position:relative;z-index:1}
.card-body{padding:8px 12px 10px;display:flex;flex-direction:column;gap:5px;background:rgba(12,10,8,0.72)}
.srow{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;color:#ccc8c2}
.srow-dot{width:6px;height:6px;border-radius:50%;border:1.5px solid;flex-shrink:0}
.srow-name{flex:1}
.srow-bar{width:3px;height:13px;border-radius:2px;flex-shrink:0}
.srow-val{font-size:11px;font-weight:700;min-width:22px;text-align:right}
.no-res{text-align:center;padding:2.5rem;color:var(--color-text-secondary);font-size:13px;grid-column:1/-1}
.foot{font-size:11px;color:var(--color-text-secondary)}
</style>

</div>

function weaponImgUrl(wInfo){
  const stem=wInfo.enFull||(wInfo.en?wInfo.en+'_icon':null);
  if(!stem)return null;
  const bytes=new TextEncoder().encode(stem+'.png');
  const hex=Array.from(bytes).map(b=>b.toString(16).padStart(2,'0').toUpperCase()).join('');
  return'https://arknights-endfield.wikiru.jp/attach2/696D67_'+hex+'.png';
}

let bF="all",eF="all",sF="all",wF="all";

const ALL_ACTIVE="--ab-bg:#4a4a4a;--ab-tx:#ffffff;--ab-border:#4a4a4a";

function buildFilters(){
  const bases=[...new Set(D.map(r=>r[0]))];
  const effs=[...new Set(D.map(r=>r[1]))];
  const skills=[...new Set(D.map(r=>r[2]))];

  document.getElementById("bf").innerHTML=
    `<button class="fbtn active" style="${ALL_ACTIVE}" onclick="setB('all')">すべて</button>`+
    bases.map(b=>`<button class="fbtn" style="${ALL_ACTIVE}" onclick="setB('${b}')">${b}</button>`).join("");

  document.getElementById("ef").innerHTML=
    `<button class="fbtn active" style="${ALL_ACTIVE}" onclick="setE('all')">すべて</button>`+
    effs.map(e=>`<button class="fbtn" style="${ALL_ACTIVE}" onclick="setE('${e}')">${e}</button>`).join("");

  document.getElementById("sf").innerHTML=
    `<button class="fbtn active" style="${ALL_ACTIVE}" onclick="setS('all')">すべて</button>`+
    skills.map(s=>`<button class="fbtn" style="${ALL_ACTIVE}" onclick="setS('${s}')">${s}</button>`).join("");

  const wtypes=["片手剣","大剣","長柄武器","拳銃","アーツユニット"];
  document.getElementById("wf").innerHTML=
    `<button class="fbtn active" style="${ALL_ACTIVE}" onclick="setW('all')">すべて</button>`+
    wtypes.map(t=>`<button class="fbtn" style="${ALL_ACTIVE}" onclick="setW('${t}')">${t}</button>`).join("");
}

function setB(v){bF=v;document.querySelectorAll("#bf .fbtn").forEach(b=>b.classList.toggle("active",b.textContent===(v==="all"?"すべて":v)));render();}
function setE(v){eF=v;document.querySelectorAll("#ef .fbtn").forEach(b=>b.classList.toggle("active",b.textContent===(v==="all"?"すべて":v)));render();}
function setS(v){sF=v;document.querySelectorAll("#sf .fbtn").forEach(b=>b.classList.toggle("active",b.textContent===(v==="all"?"すべて":v)));render();}
function setW(v){wF=v;document.querySelectorAll("#wf .fbtn").forEach(b=>b.classList.toggle("active",b.textContent===(v==="all"?"すべて":v)));render();}

function render(){
  const q=document.getElementById("q").value.trim().toLowerCase();
  const flat=D.flatMap(r=>r[3].map(w=>[r[0],r[1],r[2],w]));
  const rows=flat.filter(r=>{
    if(bF!=="all"&&r[0]!==bF)return false;
    if(eF!=="all"&&r[1]!==eF)return false;
    if(sF!=="all"&&r[2]!==sF)return false;
    if(wF!=="all"&&(WEAPON_INFO[r[3]]?.type||"")!==wF)return false;
    if(q&&!r[3].toLowerCase().includes(q))return false;
    return true;
  });
  const grid=document.getElementById("grid");
  if(!rows.length){grid.innerHTML=`<div class="no-res">該当データなし</div>`;document.getElementById("cnt").textContent="0件";return;}

  grid.innerHTML=rows.map(r=>{
    const skAcc=SK_COLOR[r[2]]||"#888888";
    const skTx=SK_TX[skAcc]||"#222";
    const bkC=BC[r[0]]||{acc:"#888",tx:"#222",txD:"#ddd"};
    const efAcc=EF_COLOR[r[1]]||"#888";
    const wInfo=WEAPON_INFO[r[3]]||{type:"不明",rarity:5};
    const dCount=wInfo.rarity>=6?6:5;
    const dColor=dCount===6?"#FF7000":"#FFBA03";
    const headBg=`linear-gradient(135deg,${dColor} 0%,${hex2rgba(dColor,0.75)} 55%,${hex2rgba(dColor,0.45)} 100%)`;
    const dTx=dCount===6?"#3d1a00":"#3d2a00";
    const dBright=dCount===6?"#3d1a00":"#3d2a00";

    return `<div class="card">
      <div class="card-head" style="background:${headBg}">
        <div class="card-deco">${r[2]}</div>
        ${(wInfo.en||wInfo.enFull)?`<img class="card-img" src="${weaponImgUrl(wInfo)}" onerror="this.style.display='none'" alt="">`:''}
        <div class="card-stars" style="color:${dBright}">${"◆".repeat(dCount)}</div>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="srow-bar" style="background:${dBright};height:30px"></div>
          <div>
            <div class="card-type-lbl" style="color:${dTx}">${wInfo.type}</div>
            <div class="card-name-txt" style="color:${dTx}">${r[3]}</div>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="srow">
          <div class="srow-dot" style="border-color:${bkC.acc}"></div>
          <span class="srow-name">${r[0]}</span>
        </div>
        <div class="srow">
          <div class="srow-dot" style="border-color:${efAcc}"></div>
          <span class="srow-name">${r[1]}</span>
        </div>
        <div class="srow">
          <div class="srow-dot" style="border-color:${skAcc}"></div>
          <span class="srow-name">${r[2]}</span>
        </div>
      </div>
    </div>`;
  }).join("");
  document.getElementById("cnt").textContent=`${rows.length} / ${flat.length} 件`;
}

buildFilters();render();
window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{buildFilters();render();});
</script>
